name: giveaway-bot

services:
  postgres:
    image: postgres:17.6-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  bot:
    build:
      context: .
      target: bot
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      HEALTH_PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - internal

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      DRAND_CHAIN_HASH: ${DRAND_CHAIN_HASH}
      DRAND_BASE_URLS: ${DRAND_BASE_URLS:-https://api.drand.sh,https://api2.drand.sh}
      PRIVACY_HASH_SALT: ${PRIVACY_HASH_SALT}
      HEALTH_PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    container_name: giveaway-bot-web
    build:
      context: .
      target: web
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - caddy

volumes:
  postgres-data:

networks:
  internal:
  caddy:
    external: true
    name: vanguard-qc-bot_default
